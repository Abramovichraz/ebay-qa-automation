[pytest]
testpaths = tests
addopts =
    -v
    --tb=short
    --alluredir=reports/allure-results
    --html=reports/html/report.html
    --self-contained-html
python_files = test_*.py
python_classes = Test*
python_functions = test_*
log_cli = true
log_cli_level = INFO
log_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_date_format = %Y-%m-%d %H:%M:%S
